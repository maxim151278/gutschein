<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gutschein</title>

<style>
@page {
  size: A4 portrait;
  margin: 8mm;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: #e9dcc0;
  font-family: Georgia, serif;
  color: #4e3a1f;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

body {
  margin: 0;
}

.page {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px;
}

.certificate {
  width: 100%;
  max-width: 860px;
  background: linear-gradient(#f7ecd4, #ecdbb7);
  border: 2px solid #b79033;
  padding: 38px 34px 34px;
  text-align: center;
  position: relative;
  overflow: hidden;
  page-break-inside: avoid;
  break-inside: avoid;
}

.certificate::before {
  content: "";
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(183, 144, 51, 0.5);
  pointer-events: none;
  z-index: 2;
}

/* Уголки */
.corner {
  position: absolute;
  width: 34px;
  height: 34px;
  border-color: #b79033;
  pointer-events: none;
  z-index: 3;
}

.corner.tl {
  top: 5px;
  left: 5px;
  border-top: 2px solid;
  border-left: 2px solid;
}

.corner.tr {
  top: 5px;
  right: 5px;
  border-top: 2px solid;
  border-right: 2px solid;
}

.corner.bl {
  bottom: 5px;
  left: 5px;
  border-bottom: 2px solid;
  border-left: 2px solid;
}

.corner.br {
  bottom: 5px;
  right: 5px;
  border-bottom: 2px solid;
  border-right: 2px solid;
}

/* Watermark */
.watermark {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 0;
  opacity: 0.05;
}

.watermark img {
  width: 270px;
  max-width: 48%;
}

.content {
  position: relative;
  z-index: 1;
}

.logo {
  width: 190px;
  max-width: 80%;
  margin-bottom: 8px;
}

.brand {
  font-size: 17px;
  letter-spacing: 2.5px;
  color: #8d6a35;
}

.title {
  font-size: 40px;
  letter-spacing: 5px;
  margin: 10px 0 8px;
  color: #5d431d;
}

.subtitle {
  font-size: 18px;
  font-style: italic;
  color: #9a7732;
}

.ornament {
  width: 140px;
  height: 2px;
  margin: 20px auto 18px;
  background: linear-gradient(to right, transparent, #b79033, transparent);
}

.amount-label,
.code-label {
  font-size: 13px;
  letter-spacing: 3px;
  color: #8d6a35;
}

.amount {
  font-size: 62px;
  margin: 12px 0 20px;
  font-weight: bold;
  color: #5d431d;
  line-height: 1;
}

.currency {
  font-size: 34px;
  margin-left: 4px;
  color: #8d6a35;
  vertical-align: baseline;
}

.code-wrap {
  margin-top: 6px;
}

.code-box {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  border: 1px solid #b79033;
  background: rgba(183, 144, 51, 0.06);
  color: #3f2d12;
  font-size: 22px;
  letter-spacing: 1px;
  font-family: "Courier New", monospace;
  min-width: 220px;
  text-align: center;
  max-width: 100%;
  word-break: break-word;
}

#code {
  color: #3f2d12;
  font-family: "Courier New", monospace;
}

.footer {
  margin-top: 26px;
  line-height: 1.7;
  font-size: 15px;
}

.secure {
  margin-top: 16px;
  font-size: 12px;
  color: #7a6235;
  font-style: italic;
  line-height: 1.5;
  padding: 0 24px;
}

.qr-divider {
  width: 76%;
  height: 1px;
  margin: 34px auto 0;
  background: linear-gradient(to right, transparent, #b79033, transparent);
}

.qr-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 24px;
  padding: 0 70px;
  gap: 50px;
}

.qr {
  text-align: center;
  flex: 0 0 auto;
}

.qr img {
  width: 68px;
  height: 68px;
  display: block;
  margin: 0 auto 6px auto;
}

.qr-label {
  font-size: 12px;
  color: #7f6230;
}

.date {
  margin-top: 22px;
  font-size: 13px;
  color: #8b6c35;
  text-transform: uppercase;
  opacity: 0.9;
}

@media screen and (max-width: 700px) {
  .page {
    padding: 8px;
  }

  .certificate {
    padding: 28px 18px 26px;
  }

  .logo {
    width: 150px;
  }

  .brand {
    font-size: 15px;
  }

  .title {
    font-size: 32px;
    letter-spacing: 4px;
  }

  .subtitle {
    font-size: 16px;
  }

  .amount {
    font-size: 48px;
  }

  .currency {
    font-size: 28px;
  }

  .code-box {
    font-size: 18px;
    min-width: 160px;
    padding: 9px 12px;
  }

  .qr-row {
    padding: 0 10px;
    gap: 20px;
  }

  .qr img {
    width: 58px;
    height: 58px;
  }
}

@media print {
  html, body {
    width: 100%;
    height: auto;
    background: #f5efea;
  }

  body {
    margin: 0;
  }

  .page {
    width: 100%;
    min-height: auto;
    padding: 0;
    display: block;
  }

  .certificate {
    width: 100%;
    max-width: none;
    margin: 0 auto;
    padding: 30px 26px 26px;
    box-shadow: none;
  }

  .watermark img {
    width: 250px;
    max-width: 44%;
  }

  .logo {
    width: 170px;
  }

  .title {
    font-size: 36px;
  }

  .subtitle {
    font-size: 17px;
  }

  .amount {
    font-size: 58px;
  }

  .currency {
    font-size: 32px;
  }

  .code-box {
    font-size: 20px;
    min-width: 210px;
  }

  .footer {
    font-size: 14px;
  }

  .secure {
    font-size: 11px;
  }

  .qr-row {
    padding: 0 55px;
    gap: 40px;
  }

  .qr img {
    width: 62px;
    height: 62px;
  }

  .date {
    margin-top: 20px;
    font-size: 12px;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="certificate">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="watermark">
      <img
        src="https://d2j6dbq0eux0bg.cloudfront.net/images/91909776/categories/199073207/5704855230.png"
        alt=""
      >
    </div>

    <div class="content">
      <img
        class="logo"
        src="https://d2j6dbq0eux0bg.cloudfront.net/images/91909776/categories/199073207/5704855230.png"
        alt="Antonia Beauty & Wellness Logo"
      >

      <div class="brand">Antonia Beauty &amp; Wellness</div>

      <div class="title">GUTSCHEIN</div>

      <div class="subtitle">Ein Geschenk für besondere Momente</div>

      <div class="ornament"></div>

      <div class="amount-label">GUTSCHEINWERT</div>
      <div class="amount">
        <span id="betrag"></span><span class="currency">€</span>
      </div>

      <div class="code-wrap">
        <div class="code-label">GUTSCHEIN-CODE</div>
        <div class="code-box">
          <span id="code"></span>
        </div>
      </div>

      <div class="footer">
        Einlösbar im Studio &amp; Online<br>
        Gültig 12 Monate ab Kaufdatum<br>
        Keine Barauszahlung möglich
      </div>

      <div class="secure">
        Maßgeblich ist der individuelle Gutscheincode aus der Bestätigungs-E-Mail.
      </div>

      <div class="qr-divider"></div>

      <div class="qr-row">
        <div class="qr">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https%3A%2F%2Fbook.timify.com%2F%3FaccountId%3D62fb4a08b7895b48108f31a6"
            alt="QR Termin buchen"
          >
          <div class="qr-label">Termin buchen</div>
        </div>

        <div class="qr">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https%3A%2F%2Fstore91909776.company.site"
            alt="QR Shop"
          >
          <div class="qr-label">Shop</div>
        </div>
      </div>

      <div class="date">
        Ausgestellt am: <span id="date"></span>
      </div>
    </div>
  </div>
</div>

<script>
function getHashParams() {
  const raw = window.location.hash.replace(/^#/, "");
  const params = new URLSearchParams(raw);
  return {
    betrag: params.get("betrag") || "",
    code: params.get("code") || ""
  };
}

const query = new URLSearchParams(window.location.search);
const hash = getHashParams();

let betrag = query.get("betrag") || hash.betrag || "";
let code = query.get("code") || hash.code || "";

try { betrag = decodeURIComponent(betrag); } catch (e) {}
try { code = decodeURIComponent(code); } catch (e) {}

betrag = betrag.replace(/[^\d.,]/g, "");
if (betrag.endsWith(",00")) betrag = betrag.slice(0, -3);
if (betrag.endsWith(".00")) betrag = betrag.slice(0, -3);

document.getElementById("betrag").textContent = betrag;
document.getElementById("code").textContent = code || "";
document.getElementById("date").textContent = new Date().toLocaleDateString("de-DE");
</script>
</body>
</html>
