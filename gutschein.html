<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gutschein</title>

<style>
@page {
  margin: 10mm;
  size: A4 portrait;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: #e9dcc0;
  font-family: Georgia, serif;
  color: #4e3a1f;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.page {
  display: flex;
  justify-content: center;
  padding: 20px;
}

.certificate {
  max-width: 760px;
  width: 100%;
  background: linear-gradient(#f7ecd4, #ecdbb7);
  border: 2px solid #b79033;
  padding: 40px;
  text-align: center;
  position: relative;
  page-break-inside: avoid;
  break-inside: avoid;
  overflow: hidden;
}

.certificate:before {
  content: "";
  position: absolute;
  inset: 12px;
  border: 1px solid rgba(183,144,51,0.5);
  pointer-events: none;
  z-index: 2;
}

/* уголки */
.corner {
  position: absolute;
  width: 40px;
  height: 40px;
  border-color: #b79033;
  pointer-events: none;
  z-index: 3;
}
.corner.tl {
  top: 6px;
  left: 6px;
  border-top: 2px solid;
  border-left: 2px solid;
}
.corner.tr {
  top: 6px;
  right: 6px;
  border-top: 2px solid;
  border-right: 2px solid;
}
.corner.bl {
  bottom: 6px;
  left: 6px;
  border-bottom: 2px solid;
  border-left: 2px solid;
}
.corner.br {
  bottom: 6px;
  right: 6px;
  border-bottom: 2px solid;
  border-right: 2px solid;
}

/* watermark */
.watermark {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 0;
  opacity: 0.06;
}
.watermark img {
  width: 300px;
  max-width: 55%;
}

.content {
  position: relative;
  z-index: 1;
}

.logo {
  width: 240px;
  max-width: 90%;
  margin-bottom: 10px;
}

.brand {
  font-size: 22px;
  letter-spacing: 3px;
  color: #8d6a35;
}

.title {
  font-size: 44px;
  letter-spacing: 6px;
  margin: 10px 0;
  color: #5d431d;
}

.subtitle {
  font-size: 20px;
  font-style: italic;
  color: #9a7732;
}

.ornament {
  width: 140px;
  height: 2px;
  margin: 24px auto;
  background: linear-gradient(to right, transparent, #b79033, transparent);
}

.amount-label,
.code-label {
  font-size: 14px;
  letter-spacing: 3px;
  color: #8d6a35;
}

.amount {
  font-size: 70px;
  margin: 18px 0 22px;
  font-weight: bold;
  color: #5d431d;
  line-height: 1;
}

.currency {
  font-size: 40px;
  margin-left: 6px;
  color: #8d6a35;
}

.code-wrap {
  margin-top: 8px;
}

.code-box {
  display: inline-block;
  margin-top: 10px;
  padding: 12px 22px;
  border: 1px solid #b79033;
  background: rgba(183,144,51,0.06);
  color: #5d431d;
  font-size: 28px;
  letter-spacing: 2px;
  font-family: Georgia, serif;
  max-width: 100%;
  word-break: break-word;
}

.footer {
  margin-top: 30px;
  line-height: 1.8;
  font-size: 16px;
}

.secure {
  margin-top: 20px;
  font-size: 13px;
  color: #7a6235;
  font-style: italic;
  line-height: 1.6;
}

.qr-divider {
  width: 70%;
  height: 1px;
  margin: 50px auto 0;
  background: linear-gradient(to right, transparent, #b79033, transparent);
}

.qr-row {
  display: flex;
  justify-content: space-between;
  margin-top: 30px;
  padding: 0 90px;
  gap: 40px;
}

.qr {
  text-align: center;
  flex: 0 0 auto;
}

.qr img {
  width: 70px;
  height: 70px;
  display: block;
  margin: 0 auto 6px auto;
}

.qr-label {
  font-size: 12px;
  color: #7f6230;
}

.date {
  margin-top: 30px;
  font-size: 14px;
  color: #8b6c35;
  text-transform: uppercase;
  opacity: 0.85;
}

@media screen and (max-width: 700px) {
  .certificate {
    padding: 28px 20px;
  }

  .logo {
    width: 200px;
  }

  .brand {
    font-size: 18px;
  }

  .title {
    font-size: 34px;
    letter-spacing: 4px;
  }

  .subtitle {
    font-size: 17px;
  }

  .amount {
    font-size: 54px;
  }

  .currency {
    font-size: 34px;
  }

  .code-box {
    font-size: 20px;
    padding: 10px 14px;
  }

  .qr-divider {
    width: 90%;
    margin-top: 40px;
  }

  .qr-row {
    padding: 0 10px;
    gap: 20px;
    margin-top: 22px;
  }

  .qr img {
    width: 64px;
    height: 64px;
  }

  .watermark img {
    width: 220px;
    max-width: 65%;
  }
}

@media print {
  .page {
    padding: 0;
  }

  .certificate {
    max-width: none;
    width: 100%;
    box-shadow: none;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="certificate">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="watermark">
      <img
        src="https://d2j6dbq0eux0bg.cloudfront.net/images/91909776/categories/199073207/5704855230.png"
        alt=""
      >
    </div>

    <div class="content">
      <img
        class="logo"
        src="https://d2j6dbq0eux0bg.cloudfront.net/images/91909776/categories/199073207/5704855230.png"
        alt="Antonia Beauty & Wellness Logo"
      >

      <div class="brand">Antonia Beauty &amp; Wellness</div>

      <div class="title">GUTSCHEIN</div>

      <div class="subtitle">Ein Geschenk für besondere Momente</div>

      <div class="ornament"></div>

      <div class="amount-label">GUTSCHEINWERT</div>
      <div class="amount">
        <span id="betrag"></span><span class="currency">€</span>
      </div>

      <div class="code-wrap">
        <div class="code-label">GUTSCHEIN-CODE</div>
        <div class="code-box">
          <span id="code"></span>
        </div>
      </div>

      <div class="footer">
        Einlösbar im Studio &amp; Online<br>
        Gültig 12 Monate ab Kaufdatum<br>
        Keine Barauszahlung möglich
      </div>

      <div class="secure">
        Maßgeblich ist der individuelle Gutscheincode aus der Bestätigungs-E-Mail.
      </div>

      <div class="qr-divider"></div>

      <div class="qr-row">
        <div class="qr">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https%3A%2F%2Fbook.timify.com%2F%3FaccountId%3D62fb4a08b7895b48108f31a6"
            alt="QR Termin buchen"
          >
          <div class="qr-label">Termin buchen</div>
        </div>

        <div class="qr">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https%3A%2F%2Fstore91909776.company.site"
            alt="QR Shop"
          >
          <div class="qr-label">Shop</div>
        </div>
      </div>

      <div class="date">
        Ausgestellt am: <span id="date"></span>
      </div>
    </div>
  </div>
</div>

<script>
function readParams() {
  const result = {
    betrag: "",
    code: "",
  };

  const query = new URLSearchParams(window.location.search);
  if (query.get("betrag")) result.betrag = query.get("betrag");
  if (query.get("code")) result.code = query.get("code");

  if (window.location.hash) {
    const rawHash = window.location.hash.replace(/^#/, "");
    const hash = new URLSearchParams(rawHash);

    if (!result.betrag && hash.get("betrag")) result.betrag = hash.get("betrag");
    if (!result.code && hash.get("code")) result.code = hash.get("code");
  }

  return result;
}

const params = readParams();

let betrag = params.betrag || "";
let code = params.code || "";

try {
  betrag = decodeURIComponent(betrag);
} catch (e) {}

try {
  code = decodeURIComponent(code);
} catch (e) {}

betrag = betrag.replace(/[^\d.,]/g, "");
if (betrag.endsWith(",00")) betrag = betrag.slice(0, -3);
if (betrag.endsWith(".00")) betrag = betrag.slice(0, -3);

document.getElementById("betrag").textContent = betrag;
document.getElementById("code").textContent = code;
document.getElementById("date").textContent = new Date().toLocaleDateString("de-DE");
</script>
</body>
</html>
