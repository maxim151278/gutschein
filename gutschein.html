<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gutschein</title>

<style>
@page{
  size:A4 portrait;
  margin:0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

body{
  background:#efe3c8;
  display:flex;
  justify-content:center;
  padding:20px;
  font-family:Georgia,serif;
  color:#5f431f;
}

.certificate{
  position:relative;
  width:900px;
  height:1270px;
  background-image:url('https://maxim151278.github.io/gutschein/premium-bg.jpg.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  overflow:hidden;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

.content{
  position:relative;
  z-index:2;
  height:100%;
  text-align:center;
  padding:26px 90px 0;
}

.logo{
  width:135px;
  margin-bottom:20px;
}

.brand{
  font-size:27px;
  letter-spacing:4px;
  color:#9a7336;
  margin-bottom:16px;
}

.title{
  font-size:78px;
  letter-spacing:8px;
  font-weight:400;
  line-height:1;
  margin-bottom:16px;
}

.subtitle{
  font-size:27px;
  font-style:italic;
  color:#a97c37;
  margin-bottom:28px;
}

.line{
  width:210px;
  height:2px;
  margin:0 auto 24px;
  background:linear-gradient(to right,transparent,#c8a25a,transparent);
}

.label{
  font-size:22px;
  letter-spacing:5px;
  color:#9a7336;
  margin-bottom:10px;
}

.amount{
  font-size:84px;
  font-weight:bold;
  line-height:1;
  margin-bottom:22px;
}

.code-label{
  font-size:20px;
  letter-spacing:4px;
  color:#9a7336;
  margin-bottom:10px;
}

.code{
  display:inline-block;
  width:76%;
  padding:13px 22px;
  background:rgba(255,255,255,.62);
  border:1px solid rgba(177,132,63,.42);
  border-radius:14px;
  font-size:24px;
  font-weight:bold;
  letter-spacing:2px;
  line-height:1.2;
  word-break:break-word;
  overflow-wrap:anywhere;
  margin-bottom:24px;
}

.receiver{
  font-size:30px;
  color:#8b6833;
  margin-bottom:22px;
}

.receiver-name{
  font-size:46px;
  font-style:italic;
  margin-left:10px;
}

.info{
  width:68%;
  margin:0 auto;
  padding:13px 22px;
  background:rgba(255,248,235,.68);
  border-radius:18px;
  font-size:20px;
  line-height:1.5;
  color:#4e3a1f;
}

.date{
  position:absolute;
  bottom:70px;
  left:0;
  right:0;
  font-size:17px;
  letter-spacing:2px;
  color:#111111;
  font-weight:bold;
  text-shadow:0 1px 2px rgba(255,255,255,0.65);
}

@media print{
  html,
  body{
    width:210mm;
    height:297mm;
    margin:0 !important;
    padding:0 !important;
    background:white;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .certificate{
    width:186mm;
    height:270mm;
    margin:0 auto;
    background-image:url('https://maxim151278.github.io/gutschein/premium-bg.jpg.png') !important;
    background-size:cover !important;
    background-position:center !important;
    background-repeat:no-repeat !important;
    page-break-after:avoid;
    page-break-inside:avoid;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  .content{
    padding:5mm 16mm 0;
  }

  .logo{
    width:32mm;
    margin-bottom:5mm;
  }

  .brand{
    font-size:20pt;
    margin-bottom:4mm;
  }

  .title{
    font-size:49pt;
    margin-bottom:4mm;
  }

  .subtitle{
    font-size:19pt;
    margin-bottom:7mm;
  }

  .line{
    margin-bottom:6mm;
  }

  .amount{
    font-size:54pt;
    margin-bottom:6mm;
  }

  .code{
    width:76%;
    font-size:18pt;
    padding:3.5mm 6mm;
    margin-bottom:6mm;
  }

  .receiver{
    font-size:22pt;
    margin-bottom:6mm;
  }

  .receiver-name{
    font-size:32pt;
  }

  .info{
    width:68%;
    font-size:15pt;
    padding:3.5mm 6mm;
  }

  .date{
    bottom:17mm;
    color:#111111;
    font-weight:bold;
  }
}
</style>
</head>

<body>

<div class="certificate">
  <div class="content">

    <img class="logo" src="https://d2j6dbq0eux0bg.cloudfront.net/images/91909776/categories/199073207/5704855230.png" alt="Antonia Logo">

    <div class="brand">Antonia Beauty & Wellness</div>

    <div class="title">GUTSCHEIN</div>

    <div class="subtitle">Ein Geschenk für besondere Momente</div>

    <div class="line"></div>

    <div class="label">GUTSCHEINWERT</div>

    <div class="amount"><span id="betrag">100</span> €</div>

    <div class="code-label">GUTSCHEINCODE</div>

    <div class="code" id="code">XXXX-XXXX</div>

    <div class="receiver">
      Für:<span class="receiver-name" id="name">Für Dich</span>
    </div>

    <div class="info">
      Einlösbar im Studio & Online<br>
      Gültig 12 Monate ab Kaufdatum<br>
      Keine Barauszahlung möglich
    </div>

    <div class="date">
      AUSGESTELLT AM: <span id="date"></span>
    </div>

  </div>
</div>

<script>
function getHashParams(){
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);

  let betrag = params.get('betrag') || '100';
  betrag = betrag.replace(',', '.');

  let number = parseFloat(betrag);

  if (!isNaN(number)) {
    betrag = number.toLocaleString('de-DE', {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    });
  }

  return {
    betrag: betrag,
    code: params.get('code') || 'XXXX-XXXX',
    name: params.get('name') || 'Für Dich'
  };
}

const data = getHashParams();

document.getElementById('betrag').textContent = data.betrag;
document.getElementById('code').textContent = data.code;
document.getElementById('name').textContent = data.name;
document.getElementById('date').textContent = new Date().toLocaleDateString('de-DE');
</script>

</body>
</html>
