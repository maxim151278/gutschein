<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gutschein</title>

<style>
@page { margin: 10mm; size: A4 portrait; }

* { box-sizing: border-box; }

html, body {
  margin:0;
  padding:0;
  background:#e9dcc0;
  font-family: Georgia, serif;
  color:#4e3a1f;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.page {
  display:flex;
  justify-content:center;
  padding:20px;
}

.certificate {
  max-width:760px;
  width:100%;
  background:linear-gradient(#f7ecd4,#ecdbb7);
  border:2px solid #b79033;
  padding:40px;
  text-align:center;
  position:relative;
  page-break-inside: avoid;
  overflow:hidden;
}

.certificate:before {
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(183,144,51,0.5);
}

.corner {
  position:absolute;
  width:40px;
  height:40px;
  border-color:#b79033;
}
.corner.tl { top:6px; left:6px; border-top:2px solid; border-left:2px solid; }
.corner.tr { top:6px; right:6px; border-top:2px solid; border-right:2px solid; }
.corner.bl { bottom:6px; left:6px; border-bottom:2px solid; border-left:2px solid; }
.corner.br { bottom:6px; right:6px; border-bottom:2px solid; border-right:2px solid; }

.watermark {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0.06;
}
.watermark img { width:300px; }

.content {
  position:relative;
  z-index:2;
}

.logo {
  width:240px;
  margin-bottom:10px;
}

.brand {
  font-size:22px;
  letter-spacing:3px;
  color:#8d6a35;
}

.title {
  font-size:44px;
  letter-spacing:6px;
  margin:10px 0;
}

.subtitle {
  font-size:20px;
  font-style:italic;
  color:#9a7732;
}

.ornament {
  width:140px;
  height:2px;
  margin:24px auto;
  background:linear-gradient(to right, transparent, #b79033, transparent);
}

.amount-label {
  font-size:14px;
  letter-spacing:3px;
  color:#8d6a35;
}

.amount {
  font-size:70px;
  margin:18px 0;
  font-weight:bold;
}

.currency {
  font-size:40px;
  margin-left:6px;
  color:#8d6a35;
}

.footer {
  margin-top:30px;
  line-height:1.8;
  font-size:16px;
}

.secure {
  margin-top:20px;
  font-size:13px;
  color:#7a6235;
  font-style:italic;
}

.qr-divider {
  width:70%;
  height:1px;
  margin:50px auto 0;
  background:linear-gradient(to right, transparent, #b79033, transparent);
}

.qr-row {
  display:flex;
  justify-content:space-between;
  margin-top:30px;
  padding:0 90px;
}

.qr img { width:70px; }

.qr-label {
  font-size:12px;
  color:#7f6230;
}

.date {
  margin-top:30px;
  font-size:14px;
  color:#8b6c35;
  text-transform:uppercase;
}

@media print {
  .page { padding:0; }
  .certificate { max-width:none; width:100%; }
}
</style>
</head>

<body>

<div class="page">
<div class="certificate">

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="watermark">
  <img src="https://d2j6dbq0eux0bg.cloudfront.net/images/91909776/categories/199073207/5704855230.png" alt="">
</div>

<div class="content">

<img class="logo"
src="https://d2j6dbq0eux0bg.cloudfront.net/images/91909776/categories/199073207/5704855230.png"
alt="Antonia Beauty & Wellness Logo">

<div class="brand">Antonia Beauty & Wellness</div>

<div class="title">GUTSCHEIN</div>

<div class="subtitle">Ein Geschenk für besondere Momente</div>

<div class="ornament"></div>

<div class="amount-label">GUTSCHEINWERT</div>

<div class="amount">
  <span id="betrag"></span><span class="currency">€</span>
</div>

<div class="footer">
  Einlösbar im Studio & Online<br>
  Gültig 12 Monate ab Kaufdatum<br>
  Keine Barauszahlung möglich
</div>

<div class="secure">
  Gültig nur mit dem individuellen Gutscheincode aus der Bestätigungs-E-Mail.
</div>

<div class="qr-divider"></div>

<div class="qr-row">
  <div class="qr">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https%3A%2F%2Fbook.timify.com%2F%3FaccountId%3D62fb4a08b7895b48108f31a6" alt="QR Termin buchen">
    <div class="qr-label">Termin buchen</div>
  </div>

  <div class="qr">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https%3A%2F%2Fstore91909776.company.site" alt="QR Shop">
    <div class="qr-label">Shop</div>
  </div>
</div>

<div class="date">
  Ausgestellt am: <span id="date"></span>
</div>

</div>
</div>
</div>

<script>
function extractAmount() {
  const params = new URLSearchParams(window.location.search);
  let betrag = params.get("betrag");

  if (!betrag && window.location.hash) {
    const hash = window.location.hash.replace(/^#/, "");
    if (hash.startsWith("betrag=")) {
      betrag = hash.substring("betrag=".length);
    }
  }

  if (!betrag) return "";

  try {
    betrag = decodeURIComponent(betrag);
  } catch (e) {}

  betrag = betrag.replace(/[^\d.,]/g, "");

  if (betrag.endsWith(",00")) betrag = betrag.slice(0, -3);
  if (betrag.endsWith(".00")) betrag = betrag.slice(0, -3);

  return betrag;
}

document.getElementById("betrag").textContent = extractAmount();
document.getElementById("date").textContent = new Date().toLocaleDateString("de-DE");
</script>

</body>
</html>
